- title: "Our official website has been officially published..."
  date: "2026-03-10"
  content: "Dedicated to pushing the boundaries of sentiment analysis and opinion mining, we have consistently leveraged advanced techniques and algorithms to decode complex data within specialized domains. Today marks a significant milestone as we launch our official web platform a digital gateway designed to showcase our research evolution and academic breakthroughs. This hub will foster global connectivity, serving as a central repository for our latest publications, project milestones, and high-impact international collaborations."

- title: "Nguyen Duc Quang Anh and Pham Minh Duc have received the ICRA 2026 Travel Grant"
