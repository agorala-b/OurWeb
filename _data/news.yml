- title: "Nguyen Duc Quang Anh and Pham Minh Duc have received the ICRA 2026 Travel Grant"
  date: "2026-01-05"
  content: "We are excited to announce that Nguyen Duc Quang Anh and Pham Minh Duc have been awarded the prestigious ICRA 2026 Travel Grant. This funding will support their participation in the International Conference on Robotics and Automation 2026, where they will present their latest research.."

- title: "Le Ba Tung Duong has been selected for the TEEP program "
  date: "2026-01-01"
  content: "We have concentrated on the state-of-the-art techniques and algorithms of sentiment analysis or opinion mining on specified domains. This academic foundation will be pivotal as Duong embarks on the Taiwan Experience Education Program (TEEP), applying advanced computational methods to real-world research challenges.."

