  content: "We are excited to announce that Nguyen Duc Quang Anh and Pham Minh Duc have been awarded the prestigious ICRA 2026 Travel Grant. This funding will support their participation in the International Conference on Robotics and Automation 2026, where they will present their latest research.."

- title: "Le Ba Tung Duong has been selected for the TEEP program "
