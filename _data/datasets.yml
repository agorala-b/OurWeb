- name: "VNEMOS: Vietnamese Speech Emotion Dataset"
  description: "A dataset of 250 annotated Vietnamese speech segments for emotion recognition, covering 5 basic emotions: anger, happiness, sadness, neutral, and anxiety."
  domain: "Speech Processing / NLP / ML"
  format: "WAV + CSV/JSON"
  size: "~50 MB"
  license: "MIT"
  download_link: "https://github.com/fiyud/VNEMOS"

- name: "IS-TPA: International School - Traffic Police Action Dataset"
  description: "A skeletal graph-based dataset for recognizing 8 fundamental Vietnamese traffic police gestures, captured using Microsoft Kinect v2 with 25 joints per skeleton at 30 FPS."
  domain: "Computer Vision / HAR / ML"
  format: "JSON (Skeletal data)"
  size: "~50 MB"
  license: "MIT"
  download_link: "https://github.com/fiyud/IS-TPA"
