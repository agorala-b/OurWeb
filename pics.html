---
layout: default
title: Pics Gallery
custom_js:
- /assets/js/gallery.js

<div class="agil-section" style="max-width: 1100px; margin: 0 auto; padding: 4rem 1.5rem;">
    <h1 class="agil-section-title" style="margin-bottom: 3rem; color: var(--agil-primary);">Gallery</h1>

    <div class="agil-gallery-grid"
        style="display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 2rem;">
        <div class="agil-gallery-item"
            style="cursor: pointer; overflow: hidden; border-radius: var(--agil-radius); box-shadow: var(--agil-shadow); aspect-ratio: 1; transition: transform 0.3s;"
            onmouseover="this.style.transform='scale(1.03)';" onmouseout="this.style.transform='scale(1)';">
            <img src="{{ '/assets/images/carousel/slide_4.jpg' | relative_url }}" alt="Lab Activity 2"
                style="width: 100%; height: 100%; object-fit: cover;">
        </div>

<!-- Lightbox Modal -->
<div id="agil-lightbox"
    style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; justify-content: center; align-items: center; padding: 2rem;">
    <span id="agil-lightbox-close"
        style="position: absolute; top: 20px; right: 30px; color: white; font-size: 2.5rem; font-weight: bold; cursor: pointer;">&times;</span>
    <img id="agil-lightbox-img" src=""
        style="max-width: 100%; max-height: 90vh; border-radius: 4px; box-shadow: 0 0 20px rgba(0,0,0,0.5);">
</div>
