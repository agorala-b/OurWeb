# Chuyển đổi sang Jekyll tĩnh
title: Agora Intelligence Lab
email: agoraintell@gmail.com
description: >- # this means to ignore newlines until "baseurl:"
  Agora Intelligence Lab (AgIL) is an independent, open AI research lab fostering academic freedom in machine learning, NLP, computer vision, and interdisciplinary AI research.
baseurl: "" # the subpath of your site, e.g. /blog
url: "https://your-github-username.github.io" # the base hostname & protocol for your site, e.g. http://example.com
twitter_username: 
github_username:  

# Build settings
markdown: kramdown
# theme: minima
plugins:
  - jekyll-feed
  - jekyll-seo-tag

# Collections
collections:
  people:
    output: true

# Defaults
defaults:
  -
    scope:
      path: ""
      type: "pages"
    values:
      layout: "default"
  -
    scope:
      path: ""
      type: "people"
    values:
      layout: "person"
